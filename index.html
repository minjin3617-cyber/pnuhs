<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 상담 및 성적 관리 시스템 V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-zinc-900 tracking-tight">상담 & 성적 관리 V6</h1>
            <p class="text-zinc-500 mt-1">학생별 상세 확인 및 엑셀 데이터 저장</p>
        </header>

        <nav class="flex space-x-1 bg-zinc-200 p-1 rounded-xl mb-8 overflow-x-auto">
            <button onclick="showTab('list')" id="btn-list" class="flex-1 min-w-[80px] py-2 rounded-lg font-medium transition-all bg-white shadow-sm">상담 목록</button>
            <button onclick="showTab('form')" id="btn-form" class="flex-1 min-w-[80px] py-2 rounded-lg font-medium transition-all">상담 작성</button>
            <button onclick="showTab('grades')" id="btn-grades" class="flex-1 min-w-[80px] py-2 rounded-lg font-medium transition-all">성적 관리</button>
            <button onclick="showTab('stats')" id="btn-stats" class="flex-1 min-w-[80px] py-2 rounded-lg font-medium transition-all">통계</button>
        </nav>

        <div id="view-list" class="tab-content">
            <input type="text" id="searchInput" oninput="renderList()" placeholder="🔍 학생 이름 검색..." class="w-full mb-6 px-4 py-3 rounded-xl border border-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm">
            <div id="logListContainer" class="space-y-4"></div>
        </div>

        <div id="view-form" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
                <form id="counselingForm" onsubmit="saveLog(event)" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-1">학생 선택</label>
                        <select id="studentSelect" required class="w-full px-4 py-2.5 rounded-lg border border-zinc-300"></select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="date" id="counselDate" required class="w-full px-4 py-2.5 rounded-lg border border-zinc-300">
                        <input type="text" id="topic" placeholder="상담 주제" required class="w-full px-4 py-2.5 rounded-lg border border-zinc-300">
                    </div>
                    <textarea id="content" rows="6" placeholder="상담 내용" required class="w-full px-4 py-2.5 rounded-lg border border-zinc-300"></textarea>
                    <button type="submit" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold">저장하기</button>
                </form>
            </div>
        </div>

        <div id="view-grades" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
                <form id="gradeForm" onsubmit="saveGrade(event)" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <select id="gName" required class="px-3 py-2 border rounded-lg"></select>
                    <select id="gType" class="px-3 py-2 border rounded-lg">
                        <option value="내신">내신</option>
                        <option value="모의고사">모의고사</option>
                    </select>
                    <input type="text" id="gSubject" placeholder="과목" required class="px-3 py-2 border rounded-lg">
                    <input type="text" id="gScore" placeholder="점수/등급" required class="px-3 py-2 border rounded-lg">
                    <button type="submit" class="md:col-span-4 py-2 bg-zinc-800 text-white rounded-lg font-bold">성적 저장</button>
                </form>
            </div>
            <div id="gradeListContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="view-stats" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
                <h2 class="text-lg font-bold mb-6">학생별 상담 횟수 (클릭 시 상세 보기)</h2>
                <div id="statsContent" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
            </div>
            <div class="text-center"><button onclick="exportCSV()" class="px-6 py-3 bg-green-600 text-white rounded-xl font-bold">엑셀로 저장(CSV)</button></div>
        </div>
    </div>

    <script>
        const students = ["강은영", "공보영", "김도영", "김서하", "김소윤", "김은지", "김주아", "김지연", "김초은", "박서현", "박수정", "박지온", "성다솔", "성지민", "손정민", "심경인", "엄지원", "우예진", "이강", "이유정", "이유진", "이희수", "장태인", "전서연", "정세린", "주하림", "최서윤", "최소은", "황윤서"];
        let logs = JSON.parse(localStorage.getItem('counseling_logs') || '[]');
        let grades = JSON.parse(localStorage.getItem('student_grades') || '[]');

        function init() {
            const selects = [document.getElementById('studentSelect'), document.getElementById('gName')];
            selects.forEach(sel => {
                sel.innerHTML = students.map(s => `<option value="${s}">${s}</option>`).join('');
            });
            showTab('list');
        }

        function showTab(tab, filterName = "") {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            if(tab === 'list') {
                document.getElementById('searchInput').value = filterName;
                renderList();
            }
            if(tab === 'grades') renderGrades();
            if(tab === 'stats') renderStats();
        }

        function renderStats() {
            const container = document.getElementById('statsContent');
            const counts = students.reduce((acc, s) => {
                acc[s] = logs.filter(l => l.studentName === s).length;
                return acc;
            }, {});
            container.innerHTML = Object.entries(counts).map(([name, count]) => `
                <div onclick="showTab('list', '${name}')" class="p-3 bg-zinc-100 rounded-lg text-center cursor-pointer hover:bg-indigo-50 transition-colors">
                    <div class="text-xs text-zinc-500">${name}</div>
                    <div class="text-lg font-bold ${count > 0 ? 'text-indigo-600' : 'text-zinc-400'}">${count}회</div>
                </div>
            `).join('');
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('logListContainer');
            const filtered = logs.filter(l => l.studentName.toLowerCase().includes(query));
            container.innerHTML = filtered.sort((a,b) => b.id - a.id).map(l => `
                <div class="bg-white p-5 rounded-xl border border-zinc-200 shadow-sm">
                    <div class="flex justify-between font-bold text-indigo-900">${l.studentName} <span class="text-xs text-zinc-400">${l.date}</span></div>
                    <div class="text-sm font-medium my-1">${l.topic}</div>
                    <div class="text-sm text-zinc-600">${l.content}</div>
                </div>
            `).join('');
        }

        function exportCSV() {
            let csv = "학생명,날짜,주제,내용\n";
            logs.forEach(l => {
                csv += `${l.studentName},${l.date},${l.topic},"${l.content.replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '상담일지.csv';
            a.click();
        }

        function renderGrades() { const container = document.getElementById('gradeListContainer'); container.innerHTML = grades.map(g => `<div class="bg-white p-4 rounded-xl border border-zinc-100 flex justify-between"><div><div class="text-xs text-zinc-500">${g.studentName} | ${g.type}</div><div class="font-bold">${g.subject}</div></div><div class="font-black text-indigo-600">${g.score}</div></div>`).join(''); }
        function saveLog(e) { e.preventDefault(); logs.push({ id: Date.now(), studentName: document.getElementById('studentSelect').value, date: document.getElementById('counselDate').value, topic: document.getElementById('topic').value, content: document.getElementById('content').value }); localStorage.setItem('counseling_logs', JSON.stringify(logs)); alert('저장 완료!'); showTab('list'); }
        function saveGrade(e) { e.preventDefault(); grades.push({ studentName: document.getElementById('gName').value, type: document.getElementById('gType').value, subject: document.getElementById('gSubject').value, score: document.getElementById('gScore').value }); localStorage.setItem('student_grades', JSON.stringify(grades)); alert('저장 완료!'); renderGrades(); }
        init();
    </script>
</body>
</html>
